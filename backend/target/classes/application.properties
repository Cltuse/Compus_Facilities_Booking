spring.application.name=Compus_Facilities_Booking

# Server Configuration
server.port=5681

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/campus_facility_booking?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Weather API Configuration
weather.api.base-url=http://t.weather.itboy.net/api/weather/city/
weather.api.city-codes={北京:101010100,上海:101020100,广州:101280101,深圳:101280601,杭州:101210101}

# IP Location API
ip.location.api=http://whois.pconline.com.cn/ipJson.jsp?ip=

# RestTemplate Configuration
rest.connection.timeout=5000
rest.read.timeout=10000


# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# Jackson Configuration
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# File Upload Configuration
file.upload-dir=files
file.base-url=http://localhost:5681/files
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# JWT Configuration
jwt.secret=CampusFacilitiesBookingJwtSecretKeyCampusFacilitiesBookingJwtSecretKey
jwt.expiration-millis=86400000
