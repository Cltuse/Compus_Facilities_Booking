spring.application.name=Compus_Facilities_Booking
spring.profiles.default=dev

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

weather.api.base-url=${WEATHER_API_BASE_URL:http://t.weather.itboy.net/api/weather/city/}
weather.api.city-codes=${WEATHER_API_CITY_CODES:北京:101010100,上海:101020100,广州:101280101,深圳:101280601,杭州:101210101}
ip.location.api=${IP_LOCATION_API:http://whois.pconline.com.cn/ipJson.jsp?ip=}

rest.connection.timeout=${REST_CONNECTION_TIMEOUT:5000}
rest.read.timeout=${REST_READ_TIMEOUT:10000}

file.upload-dir=${FILE_UPLOAD_DIR:files}
file.base-url=${FILE_BASE_URL:/files}

jwt.secret=${JWT_SECRET:CampusFacilitiesBookingJwtSecretKeyCampusFacilitiesBookingJwtSecretKey}
jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:86400000}

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000}
